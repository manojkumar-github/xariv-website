<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <defs>
    <marker id="arx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a0b8"/>
    </marker>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#0b1020">Collapsing inter-node messages with hierarchical all-to-all</text>

  <!-- BEFORE -->
  <text x="60" y="86" font-size="15" font-weight="700" fill="#b91c1c">Flat all-to-all</text>
  <text x="60" y="106" font-size="12" fill="#6b7280">every GPU ↔ every remote GPU · O(N²) small inter-node flows</text>
  <g font-size="11" fill="#0b1020">
    <g fill="#eef1fb" stroke="#cdd5ee">
      <rect x="70" y="130" width="46" height="34" rx="7"/><rect x="124" y="130" width="46" height="34" rx="7"/>
      <rect x="70" y="320" width="46" height="34" rx="7"/><rect x="124" y="320" width="46" height="34" rx="7"/>
      <rect x="320" y="130" width="46" height="34" rx="7"/><rect x="374" y="130" width="46" height="34" rx="7"/>
      <rect x="320" y="320" width="46" height="34" rx="7"/><rect x="374" y="320" width="46" height="34" rx="7"/>
    </g>
    <text x="120" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Node A</text>
    <text x="370" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Node B</text>
  </g>
  <g stroke="#ef4444" stroke-width="1.3" opacity="0.75">
    <line x1="116" y1="147" x2="320" y2="147"/><line x1="116" y1="147" x2="320" y2="337"/>
    <line x1="170" y1="147" x2="374" y2="147"/><line x1="170" y1="147" x2="374" y2="337"/>
    <line x1="116" y1="337" x2="320" y2="147"/><line x1="116" y1="337" x2="374" y2="337"/>
    <line x1="170" y1="337" x2="320" y2="337"/><line x1="170" y1="337" x2="374" y2="147"/>
  </g>
  <text x="245" y="400" text-anchor="middle" font-size="12" fill="#ef4444" font-weight="600">many tiny flows saturate message rate</text>

  <!-- divider -->
  <line x1="500" y1="80" x2="500" y2="410" stroke="#e3e7f0"/>

  <!-- AFTER -->
  <text x="560" y="86" font-size="15" font-weight="700" fill="#047857">Hierarchical (NVLink → IB → NVLink)</text>
  <text x="560" y="106" font-size="12" fill="#6b7280">gather on-node, one fat inter-node exchange, scatter on-node</text>
  <g font-size="11" fill="#0b1020">
    <g fill="#eef1fb" stroke="#cdd5ee">
      <rect x="560" y="150" width="42" height="30" rx="6"/><rect x="606" y="150" width="42" height="30" rx="6"/>
      <rect x="560" y="300" width="42" height="30" rx="6"/><rect x="606" y="300" width="42" height="30" rx="6"/>
      <rect x="880" y="150" width="42" height="30" rx="6"/><rect x="926" y="150" width="42" height="30" rx="6"/>
      <rect x="880" y="300" width="42" height="30" rx="6"/><rect x="926" y="300" width="42" height="30" rx="6"/>
    </g>
    <!-- node-local aggregators -->
    <rect x="678" y="210" width="70" height="60" rx="10" fill="#eef9f4" stroke="#10b981"/>
    <text x="713" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">agg A</text>
    <text x="713" y="252" text-anchor="middle" font-size="10" fill="#047857">NVLink</text>
    <rect x="778" y="210" width="70" height="60" rx="10" fill="#eef9f4" stroke="#10b981"/>
    <text x="813" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">agg B</text>
    <text x="813" y="252" text-anchor="middle" font-size="10" fill="#047857">NVLink</text>
  </g>
  <!-- gather -->
  <g stroke="#10b981" stroke-width="1.6" fill="none" marker-end="url(#arx)">
    <path d="M602 165 C650 180 660 210 678 226"/>
    <path d="M648 165 C665 185 668 205 678 234"/>
    <path d="M602 315 C650 300 660 270 678 254"/>
    <path d="M648 315 C665 300 668 275 678 246"/>
    <path d="M922 165 C870 180 862 210 848 226"/>
    <path d="M968 165 C900 185 880 205 848 234"/>
    <path d="M922 315 C870 300 862 270 848 254"/>
    <path d="M968 315 C900 300 880 275 848 246"/>
  </g>
  <!-- single inter-node fat link -->
  <path d="M748 240 H778" stroke="#3730a3" stroke-width="5" fill="none" marker-end="url(#arx)" marker-start="url(#arx)"/>
  <text x="763" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">1 fat</text>
  <text x="763" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">IB exchange</text>

  <text x="763" y="400" text-anchor="middle" font-size="12" fill="#047857" font-weight="600">inter-node messages ↓, bandwidth used efficiently</text>
</svg>
