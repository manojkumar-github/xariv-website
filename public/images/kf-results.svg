<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="44" font-size="22" font-weight="700" fill="#0b1020">Results after fusion (single H100)</text>

  <!-- legend -->
  <rect x="700" y="30" width="14" height="14" rx="3" fill="#cbd2e0"/><text x="720" y="42" font-size="12.5" fill="#6b7280">before</text>
  <rect x="800" y="30" width="14" height="14" rx="3" fill="#4f46e5"/><text x="820" y="42" font-size="12.5" fill="#6b7280">after</text>

  <g font-size="13.5" fill="#0b1020">
    <!-- TTFT (lower better) -->
    <text x="40" y="98" font-weight="600">TTFT</text>
    <rect x="180" y="84" width="210" height="20" rx="5" fill="#cbd2e0"/><text x="398" y="100" font-size="12.5" fill="#6b7280">210 ms</text>
    <rect x="180" y="108" width="155" height="20" rx="5" fill="#4f46e5"/><text x="343" y="124" font-size="12.5" fill="#3730a3">150 ms</text>

    <!-- tokens/sec -->
    <text x="40" y="170" font-weight="600">Decode tok/s</text>
    <rect x="180" y="156" width="130" height="20" rx="5" fill="#cbd2e0"/><text x="318" y="172" font-size="12.5" fill="#6b7280">120</text>
    <rect x="180" y="180" width="210" height="20" rx="5" fill="#4f46e5"/><text x="398" y="196" font-size="12.5" fill="#3730a3">195</text>

    <!-- GPU util -->
    <text x="40" y="242" font-weight="600">GPU memory BW used</text>
    <rect x="240" y="228" width="120" height="20" rx="5" fill="#cbd2e0"/><text x="368" y="244" font-size="12.5" fill="#6b7280">52%</text>
    <rect x="240" y="252" width="175" height="20" rx="5" fill="#4f46e5"/><text x="423" y="268" font-size="12.5" fill="#3730a3">76%</text>

    <!-- throughput -->
    <text x="40" y="314" font-weight="600">Throughput</text>
    <rect x="180" y="300" width="120" height="20" rx="5" fill="#cbd2e0"/><text x="308" y="316" font-size="12.5" fill="#6b7280">1.0×</text>
    <rect x="180" y="324" width="204" height="20" rx="5" fill="#4f46e5"/><text x="392" y="340" font-size="12.5" fill="#3730a3">1.7×</text>
  </g>

  <text x="560" y="180" font-size="13" fill="#047857" font-weight="600">~1.7× throughput</text>
  <text x="560" y="202" font-size="13" fill="#047857" font-weight="600">at the same model quality</text>
  <text x="560" y="230" font-size="12" fill="#6b7280">→ fewer GPUs per million requests</text>
  <text x="560" y="248" font-size="12" fill="#6b7280">→ lower cost, lower latency</text>
</svg>
