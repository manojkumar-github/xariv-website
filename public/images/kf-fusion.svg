<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#0b1020">Kernel fusion: fewer launches, fewer memory round-trips</text>

  <!-- BEFORE -->
  <text x="60" y="84" font-size="15" font-weight="700" fill="#b91c1c">Before — many small kernels</text>
  <g>
    <!-- timeline -->
    <text x="60" y="120" font-size="12" fill="#6b7280">GPU timeline (one decode step)</text>
    <g>
      <rect x="60" y="132" width="34" height="30" rx="5" fill="#c7cdf2"/>
      <rect x="104" y="132" width="22" height="30" rx="5" fill="#c7cdf2"/>
      <rect x="138" y="132" width="44" height="30" rx="5" fill="#c7cdf2"/>
      <rect x="196" y="132" width="60" height="30" rx="5" fill="#c7cdf2"/>
      <rect x="270" y="132" width="50" height="30" rx="5" fill="#c7cdf2"/>
    </g>
    <!-- gaps -->
    <g fill="#ef4444" font-size="10" text-anchor="middle">
      <rect x="94" y="142" width="10" height="10" fill="#fca5a5"/>
      <rect x="126" y="142" width="12" height="10" fill="#fca5a5"/>
      <rect x="182" y="142" width="14" height="10" fill="#fca5a5"/>
      <rect x="256" y="142" width="14" height="10" fill="#fca5a5"/>
    </g>
    <text x="330" y="152" font-size="11" fill="#ef4444">launch + sync gaps</text>
    <!-- ops list -->
    <g font-size="12.5" fill="#0b1020">
      <rect x="60" y="190" width="380" height="180" rx="12" fill="#fff" stroke="#e3e7f0"/>
      <text x="80" y="216" fill="#6b7280">dozens of kernels per layer · each round-trips HBM</text>
      <g fill="#f1f4fb" stroke="#d8dce8">
        <rect x="80" y="232" width="160" height="32" rx="7"/><rect x="80" y="272" width="160" height="32" rx="7"/>
        <rect x="80" y="312" width="160" height="32" rx="7"/>
        <rect x="260" y="232" width="160" height="32" rx="7"/><rect x="260" y="272" width="160" height="32" rx="7"/>
      </g>
      <text x="160" y="253" text-anchor="middle">RMSNorm</text><text x="160" y="293" text-anchor="middle">RoPE</text>
      <text x="160" y="333" text-anchor="middle">QKV proj</text>
      <text x="340" y="253" text-anchor="middle">attention</text><text x="340" y="293" text-anchor="middle">MLP gate/up/down</text>
    </g>
  </g>

  <line x1="500" y1="70" x2="500" y2="420" stroke="#e3e7f0"/>

  <!-- AFTER -->
  <text x="560" y="84" font-size="15" font-weight="700" fill="#047857">After — fused kernels + CUDA graph replay</text>
  <g>
    <text x="560" y="120" font-size="12" fill="#6b7280">GPU timeline (one decode step)</text>
    <g>
      <rect x="560" y="132" width="70" height="30" rx="5" fill="#34d399"/>
      <rect x="634" y="132" width="86" height="30" rx="5" fill="#34d399"/>
      <rect x="724" y="132" width="78" height="30" rx="5" fill="#34d399"/>
    </g>
    <text x="812" y="152" font-size="11" fill="#047857">packed, no gaps</text>
    <g font-size="12.5" fill="#0b1020">
      <rect x="560" y="190" width="380" height="180" rx="12" fill="#fff" stroke="#e3e7f0"/>
      <text x="580" y="216" fill="#6b7280">few kernels · activations stay in registers/SRAM</text>
      <g fill="#eef9f4" stroke="#bfe6d4">
        <rect x="580" y="232" width="340" height="34" rx="8"/>
        <rect x="580" y="276" width="340" height="34" rx="8"/>
        <rect x="580" y="320" width="340" height="34" rx="8"/>
      </g>
      <text x="750" y="254" text-anchor="middle" font-weight="600" fill="#047857">Fused RMSNorm + RoPE + QKV</text>
      <text x="750" y="298" text-anchor="middle" font-weight="600" fill="#047857">FlashAttention (no materialized scores)</text>
      <text x="750" y="342" text-anchor="middle" font-weight="600" fill="#047857">Fused SwiGLU MLP + dequant epilogue</text>
    </g>
  </g>

  <text x="500" y="448" text-anchor="middle" font-size="12.5" fill="#3730a3" font-weight="600">same math, same model quality — less memory traffic, fewer launches, higher throughput</text>
</svg>
