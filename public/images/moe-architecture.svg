<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 470" font-family="system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a0b8"/>
    </marker>
  </defs>
  <rect width="1160" height="470" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#0b1020">Inference platform — request lifecycle</text>

  <!-- top row pipeline -->
  <g font-size="14" fill="#0b1020">
    <!-- Client -->
    <rect x="40" y="92" width="150" height="74" rx="14" fill="#f1f4fb" stroke="#d8dce8"/>
    <text x="115" y="126" text-anchor="middle" font-weight="600">Client query</text>
    <text x="115" y="148" text-anchor="middle" font-size="12" fill="#6b7280">billions / day</text>

    <!-- Router -->
    <rect x="240" y="92" width="170" height="74" rx="14" fill="#fff" stroke="#d8dce8"/>
    <text x="325" y="120" text-anchor="middle" font-weight="600">Frontend router</text>
    <text x="325" y="140" text-anchor="middle" font-size="12" fill="#6b7280">auth · routing · SLO</text>

    <!-- Batcher -->
    <rect x="460" y="92" width="190" height="74" rx="14" fill="#fff" stroke="#d8dce8"/>
    <text x="555" y="120" text-anchor="middle" font-weight="600">Continuous batcher</text>
    <text x="555" y="140" text-anchor="middle" font-size="12" fill="#6b7280">prefill + decode queues</text>

    <!-- Decoder -->
    <rect x="700" y="92" width="190" height="74" rx="14" fill="#fff" stroke="#d8dce8"/>
    <text x="795" y="120" text-anchor="middle" font-weight="600">MoE decoder</text>
    <text x="795" y="140" text-anchor="middle" font-size="12" fill="#6b7280">attention + top-k router</text>

    <!-- Response -->
    <rect x="940" y="92" width="180" height="74" rx="14" fill="#eef9f4" stroke="#bfe6d4"/>
    <text x="1030" y="126" text-anchor="middle" font-weight="600">Answer stream</text>
    <text x="1030" y="148" text-anchor="middle" font-size="12" fill="#10b981">sub-second p99</text>
  </g>

  <g stroke="#94a0b8" stroke-width="2" marker-end="url(#ar)" fill="none">
    <path d="M190 129 H236"/>
    <path d="M410 129 H456"/>
    <path d="M650 129 H696"/>
    <path d="M890 129 H936"/>
  </g>

  <!-- expert-parallel group -->
  <rect x="40" y="220" width="1080" height="210" rx="18" fill="#fbfcff" stroke="#dfe4f1"/>
  <text x="64" y="252" font-size="15" font-weight="700" fill="#3730a3">Expert-parallel group · 235B-param MoE sharded across the GPU fleet</text>

  <g font-size="12.5" fill="#0b1020">
    <!-- nodes -->
    <g>
      <rect x="64" y="272" width="300" height="138" rx="12" fill="#fff" stroke="#d8dce8"/>
      <text x="80" y="296" font-size="12" font-weight="600" fill="#6b7280">Node A · 8× NVIDIA H100 (NVLink/NVSwitch)</text>
      <g fill="url(#g)">
        <rect x="80" y="312" width="58" height="40" rx="8"/><rect x="146" y="312" width="58" height="40" rx="8"/>
        <rect x="212" y="312" width="58" height="40" rx="8"/><rect x="278" y="312" width="58" height="40" rx="8"/>
        <rect x="80" y="360" width="58" height="40" rx="8"/><rect x="146" y="360" width="58" height="40" rx="8"/>
        <rect x="212" y="360" width="58" height="40" rx="8"/><rect x="278" y="360" width="58" height="40" rx="8"/>
      </g>
      <text x="109" y="337" text-anchor="middle" fill="#fff" font-size="11">E0</text>
      <text x="175" y="337" text-anchor="middle" fill="#fff" font-size="11">E1</text>
      <text x="241" y="337" text-anchor="middle" fill="#fff" font-size="11">E2</text>
      <text x="307" y="337" text-anchor="middle" fill="#fff" font-size="11">E3</text>
    </g>

    <!-- fabric -->
    <rect x="404" y="300" width="352" height="82" rx="12" fill="#eef1fb" stroke="#cdd5ee"/>
    <text x="580" y="332" text-anchor="middle" font-weight="700" fill="#3730a3">InfiniBand / RoCE fabric</text>
    <text x="580" y="354" text-anchor="middle" font-size="12" fill="#6b7280">all-to-all dispatch + combine (NCCL)</text>

    <g>
      <rect x="796" y="272" width="300" height="138" rx="12" fill="#fff" stroke="#d8dce8"/>
      <text x="812" y="296" font-size="12" font-weight="600" fill="#6b7280">Node B · 8× NVIDIA H100 (NVLink/NVSwitch)</text>
      <g fill="url(#g)">
        <rect x="812" y="312" width="58" height="40" rx="8"/><rect x="878" y="312" width="58" height="40" rx="8"/>
        <rect x="944" y="312" width="58" height="40" rx="8"/><rect x="1010" y="312" width="58" height="40" rx="8"/>
        <rect x="812" y="360" width="58" height="40" rx="8"/><rect x="878" y="360" width="58" height="40" rx="8"/>
        <rect x="944" y="360" width="58" height="40" rx="8"/><rect x="1010" y="360" width="58" height="40" rx="8"/>
      </g>
      <text x="841" y="337" text-anchor="middle" fill="#fff" font-size="11">E4</text>
      <text x="907" y="337" text-anchor="middle" fill="#fff" font-size="11">E5</text>
      <text x="973" y="337" text-anchor="middle" fill="#fff" font-size="11">E6</text>
      <text x="1039" y="337" text-anchor="middle" fill="#fff" font-size="11">E7</text>
    </g>
  </g>

  <g stroke="#94a0b8" stroke-width="2" marker-end="url(#ar)" marker-start="url(#ar)" fill="none">
    <path d="M364 341 H402"/>
    <path d="M758 341 H794"/>
  </g>
</svg>
