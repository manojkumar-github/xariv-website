<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="40" y="44" font-size="22" font-weight="700" fill="#0b1020">Rail-optimized topology</text>
  <text x="40" y="70" font-size="14" fill="#6b7280">Each GPU's NIC homes to its own rail/leaf, so all-to-all maps onto parallel rails instead of one hotspot.</text>

  <!-- spine -->
  <rect x="360" y="100" width="280" height="50" rx="12" fill="#eef1fb" stroke="#cdd5ee"/>
  <text x="500" y="131" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">Spine switches (Quantum-2 NDR)</text>

  <!-- leaves / rails -->
  <g font-size="12.5" fill="#0b1020">
    <rect x="120" y="210" width="160" height="46" rx="10" fill="#fff" stroke="#d8dce8"/>
    <text x="200" y="238" text-anchor="middle" font-weight="600">Leaf · rail 0</text>
    <rect x="340" y="210" width="160" height="46" rx="10" fill="#fff" stroke="#d8dce8"/>
    <text x="420" y="238" text-anchor="middle" font-weight="600">Leaf · rail 1</text>
    <rect x="560" y="210" width="160" height="46" rx="10" fill="#fff" stroke="#d8dce8"/>
    <text x="640" y="238" text-anchor="middle" font-weight="600">Leaf · rail 2</text>
    <rect x="780" y="210" width="160" height="46" rx="10" fill="#fff" stroke="#d8dce8"/>
    <text x="860" y="238" text-anchor="middle" font-weight="600">Leaf · rail 3</text>
  </g>

  <g stroke="#94a0b8" stroke-width="1.6">
    <line x1="460" y1="150" x2="200" y2="210"/>
    <line x1="480" y1="150" x2="420" y2="210"/>
    <line x1="520" y1="150" x2="640" y2="210"/>
    <line x1="540" y1="150" x2="860" y2="210"/>
  </g>

  <!-- two nodes with NVLink islands -->
  <g font-size="11.5" fill="#0b1020">
    <rect x="120" y="320" width="360" height="150" rx="14" fill="#fbfcff" stroke="#dfe4f1"/>
    <text x="140" y="346" font-size="12" font-weight="700" fill="#3730a3">Node A — NVLink/NVSwitch island</text>
    <g fill="#eef1fb" stroke="#cdd5ee">
      <rect x="140" y="360" width="70" height="44" rx="8"/><rect x="222" y="360" width="70" height="44" rx="8"/>
      <rect x="304" y="360" width="70" height="44" rx="8"/><rect x="386" y="360" width="70" height="44" rx="8"/>
    </g>
    <text x="175" y="387" text-anchor="middle">GPU0</text><text x="257" y="387" text-anchor="middle">GPU1</text>
    <text x="339" y="387" text-anchor="middle">GPU2</text><text x="421" y="387" text-anchor="middle">GPU3</text>
    <text x="298" y="436" text-anchor="middle" font-size="11" fill="#6b7280">intra-node: 900 GB/s NVLink (no fabric)</text>

    <rect x="520" y="320" width="360" height="150" rx="14" fill="#fbfcff" stroke="#dfe4f1"/>
    <text x="540" y="346" font-size="12" font-weight="700" fill="#3730a3">Node B — NVLink/NVSwitch island</text>
    <g fill="#eef1fb" stroke="#cdd5ee">
      <rect x="540" y="360" width="70" height="44" rx="8"/><rect x="622" y="360" width="70" height="44" rx="8"/>
      <rect x="704" y="360" width="70" height="44" rx="8"/><rect x="786" y="360" width="70" height="44" rx="8"/>
    </g>
    <text x="575" y="387" text-anchor="middle">GPU0</text><text x="657" y="387" text-anchor="middle">GPU1</text>
    <text x="739" y="387" text-anchor="middle">GPU2</text><text x="821" y="387" text-anchor="middle">GPU3</text>
    <text x="700" y="436" text-anchor="middle" font-size="11" fill="#6b7280">intra-node: 900 GB/s NVLink (no fabric)</text>
  </g>

  <!-- rail-aligned links node->leaf (same index to same rail) -->
  <g stroke="#06b6d4" stroke-width="1.8" stroke-dasharray="4 3">
    <line x1="175" y1="360" x2="200" y2="256"/>
    <line x1="257" y1="360" x2="420" y2="256"/>
    <line x1="339" y1="360" x2="640" y2="256"/>
    <line x1="421" y1="360" x2="860" y2="256"/>
    <line x1="575" y1="360" x2="200" y2="256"/>
    <line x1="657" y1="360" x2="420" y2="256"/>
    <line x1="739" y1="360" x2="640" y2="256"/>
    <line x1="821" y1="360" x2="860" y2="256"/>
  </g>
  <text x="40" y="500" font-size="11.5" fill="#06b6d4">— rail-aligned NIC→leaf links (GPU index i always uses rail i)</text>
</svg>
